<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Interferences — Juan Pedro Vallejo</title>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

<style>
html,
body {
  margin: 0;
  min-height: 100%;
  font-family: Helvetica, sans-serif;
  color: black;
  background: white;
}

body {
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  z-index: 100;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.nav-right {
  display: flex;
  align-items: center;
}

nav a,
.brand {
  color: black;
  text-decoration: none;
  cursor: pointer;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropdown-content {
  position: absolute;
  top: 40px;
  left: 0;
  background: white;
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 10px;
  min-width: 220px;
  z-index: 30;
}

.dropdown-content a {
  color: black;
  text-decoration: none;
  padding: 6px 8px;
}

.dropdown-content a:hover {
  background: black;
  color: white;
}

/* BREVO */
.sib-form,
#sib-form-container,
#sib-container {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  margin: 0 !important;
}

#sib-form {
  display: flex;
  gap: 10px;
  align-items: center;
}

#sib-form > div {
  padding: 0 !important;
}

#sib-container input {
  width: 180px;
  border: none;
  border-bottom: 1px solid black;
  background: transparent;
  padding: 4px 0;
}

#sib-form button {
  background: black !important;
  color: white !important;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
}

/* CONTENT */
main {
  padding-top: 95px;
  padding-bottom: 50px;
  width: calc(100% - 40px);
  max-width: 1200px;
  margin: auto;
}

h1 {
  font-size: 30px;
  font-weight: normal;
  margin: 0 0 12px 0;
}

.description {
  font-size: 14px;
  line-height: 1.45;
  max-width: 720px;
  margin-bottom: 24px;
}

.description a {
  color: black;
  text-decoration: underline;
}

/* SHOWCASE */
.token-wrap {
  width: min(78vh, 100%, 900px);
  aspect-ratio: 1 / 1;
  margin: 0 auto;
}

.token-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* CONTROLS */
.controls {
  text-align: center;
  margin-top: 18px;
  padding-bottom: 10px;
}

.controls button {
  background: black;
  color: white;
  border: none;
  padding: 10px 16px;
  cursor: pointer;
  margin-right: 12px;
}

.meta {
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 700px) {

  nav {
    padding: 15px;
  }

  main {
    width: calc(100% - 20px);
    padding-top: 82px;
  }

  #sib-container input {
    width: 110px;
  }

  .token-wrap {
    width: 100%;
  }

  .description {
    font-size: 13px;
  }

  .controls button {
    display: block;
    margin: 0 auto 10px auto;
  }

  .meta {
    display: block;
  }
}
</style>
</head>

<body>

<div id="header"></div>

<main>

<h1>INTERFERENCES</h1>

<div class="description">
A generative series exploring vibration, layering, rhythm and signal collision.
Each visit loads a random live token directly from the generator.

<br><br>

<a href="https://www.artblocks.io/collection/interferences-by-juan-pedro-vallejo" target="_blank">
View project on Art Blocks
</a>
</div>

<div class="token-wrap">
<iframe id="tokenFrame" allowfullscreen></iframe>
</div>

<div class="controls">
<button onclick="loadRandomToken()">Load Another Output</button>
<span class="meta" id="tokenLabel"></span>
</div>

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {

  fetch("./header.html?" + Date.now())
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data

    window.toggleMenu = function() {
      const menu = document.getElementById("work-menu")

      menu.style.display =
        menu.style.display === "flex"
        ? "none"
        : "flex"
    }

    document.addEventListener("click", (e) => {
      const dropdown = document.querySelector(".dropdown")
      const menu = document.getElementById("work-menu")

      if (dropdown && !dropdown.contains(e.target)) {
        menu.style.display = "none"
      }
    })
  })

})

function loadRandomToken() {
  const number = Math.floor(Math.random() * 257)
  const tokenId = 354000000 + number

  document.getElementById("tokenFrame").src =
    "https://generator.artblocks.io/1/0xa7d8d9ef8d8ce8992df33d8b8cf4aebabd5bd270/" + tokenId

  document.getElementById("tokenLabel").innerText =
    "Interferences #" + number
}

loadRandomToken()
</script>

<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>

</body>
</html>
