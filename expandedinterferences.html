<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Expanded Interferences — Juan Pedro Vallejo</title>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

<style>
body {
  margin: 0;
  font-family: Helvetica, sans-serif;
  color: black;
  background: white;
}

/* CONTENT */
main {
  padding-top: 120px;
  width: calc(100% - 80px);
  max-width: 1100px;
  margin: auto;
}

h1 {
  font-size: 32px;
  font-weight: normal;
  margin-bottom: 20px;
}

.description {
  max-width: 720px;
  line-height: 1.5;
  margin-bottom: 40px;
}

/* PDF RENDER */
#pdf-container canvas {
  width: 100%;
  display: block;
  margin-bottom: 40px;
}

/* MOBILE */
@media (max-width: 800px) {
  main {
    width: calc(100% - 30px);
  }
}
</style>
</head>

<body>

<div id="header"></div>

<main>

<h1>EXPANDED INTERFERENCES</h1>

<div class="description">
A spatial and material extension of the Interferences series.

This body of work explores continuity, fragmentation, and the translation of generative systems into physical formats.
</div>

<div id="pdf-container"></div>

</main>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* LOAD HEADER */
  fetch("./header.html?" + Date.now())
  .then(response => response.text())
  .then(data => {
    document.getElementById("header").innerHTML = data

    window.toggleMenu = function() {
      const menu = document.getElementById("work-menu")

      menu.style.display =
        menu.style.display === "flex"
        ? "none"
        : "flex"
    }

    document.addEventListener("click", (e) => {
      const dropdown = document.querySelector(".dropdown")
      const menu = document.getElementById("work-menu")

      if (dropdown && !dropdown.contains(e.target)) {
        menu.style.display = "none"
      }
    })
  })

  /* PDF RENDER */
  const url = "INTERFERENCES2.pdf"

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"

  const container = document.getElementById("pdf-container")

  pdfjsLib.getDocument(url).promise.then(pdf => {

    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {

      pdf.getPage(pageNumber).then(page => {

        const scale = 1.6
        const viewport = page.getViewport({ scale })

        const canvas = document.createElement("canvas")
        const context = canvas.getContext("2d")

        canvas.width = viewport.width
        canvas.height = viewport.height

        container.appendChild(canvas)

        page.render({
          canvasContext: context,
          viewport: viewport
        })
      })
    }

  })

})
</script>

<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>

</body>
</html>
