<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Juan Pedro Vallejo</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, sans-serif;
  overflow: hidden;
}

/* ─── TOP BAR ────────────────────────── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
  background: white;
  z-index: 10;
}

/* left side */
.nav-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

/* right side */
.nav-right {
  display: flex;
  align-items: center;
}

nav a {
  text-decoration: none;
  color: black;
  cursor: pointer;
  white-space: nowrap;
}

/* ─── DROPDOWN ───────────────────────── */
.dropdown {
  position: relative;
}

.dropdown-content {
  position: absolute;
  top: 40px;
  left: 0;
  background: white;
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
  z-index: 30;
}

/* ─── SECTION ────────────────────────── */
.section {
  width: 100vw;
  height: 100vh;
  position: relative;
}

#init {
  background: #e3e3ff;
}

/* ─── P5 ─────────────────────────────── */
#p5-container {
  position: absolute;
  width: 100%;
  height: 100%;
  inset: 0;
}

/* ─── BREVO INLINE FORM ──────────────── */
.sib-form,
#sib-container,
#sib-form-container {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  margin: 0 !important;
}

#sib-form {
  display: flex;
  align-items: center;
  gap: 10px;
}

#sib-form > div {
  padding: 0 !important;
}

#sib-container input {
  background: transparent;
  border: none;
  border-bottom: 1px solid black;
  color: black;
  font-family: Helvetica, sans-serif;
  font-size: 14px;
  padding: 4px 0;
  width: 180px;
}

#sib-container input::placeholder {
  color: rgba(0,0,0,0.5);
}

.sib-form-block__button,
#sib-form button {
  background: black !important;
  color: white !important;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  white-space: nowrap;
}
</style>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">
</head>

<body>

<nav>

  <div class="nav-left">
    <span class="brand">JUAN PEDRO VALLEJO</span>

    <a onclick="goTo(0)">INIT</a>

    <div class="dropdown">
      <a onclick="toggleMenu()">WORK</a>

      <div id="work-menu" class="dropdown-content">
        <a>Artblocks</a>
        <a>Bright Moments</a>
        <a>Interferences</a>
        <a>Explorations</a>
      </div>
    </div>
  </div>

  <div class="nav-right">

    <div class="sib-form">
      <div id="sib-form-container">
        <div id="sib-container">

          <form id="sib-form" method="POST"
          action="https://2aca6431.sibforms.com/serve/MUIFALDayEnwa07abYbQcQh0sZNqq3MoE1hVtkLpDcRCFIN543RP7-94aG8Y3-wszQb6mXglL48Z6LiFFuXbkgYldHYnD33qyhfj8PpXXI0fV7Z7ylj3Y0_sAuAgof4dXXiUHXg9Dv0GQX6UU5q3ZEZ1v-u1fg1w2SzifRVp6WTq1iD8pLisKADOYLbHSmB0x4kLApDXnnMR0LPSwQ==">

            <div>
              <input type="text" name="EMAIL" placeholder="EMAIL" required />
            </div>

            <div>
              <button type="submit">Newsletter</button>
            </div>

          </form>

        </div>
      </div>
    </div>

  </div>

</nav>

<div class="section" id="init">
  <div id="p5-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="Random.js"></script>
<script src="sketch.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  window.goTo = function(i) {}

  window.toggleMenu = function() {
    const menu = document.getElementById("work-menu");
    menu.style.display =
      menu.style.display === "flex" ? "none" : "flex";
  }

  document.addEventListener("click", (e) => {
    const menu = document.getElementById("work-menu");
    const dropdown = document.querySelector(".dropdown");

    if (!dropdown.contains(e.target)) {
      menu.style.display = "none";
    }
  });

});
</script>

<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>

</body>
</html>
