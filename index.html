<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Juan Pedro Vallejo</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, sans-serif;
  overflow: hidden;
}

/* ─── MENU ───────────────────────────── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 20px;
  padding: 20px;
  background: white;
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: black;
  cursor: pointer;
}

/* ─── DROPDOWN ───────────────────────── */
.dropdown {
  position: relative;
}

.dropdown-content {
  position: absolute;
  top: 40px;
  left: 0;
  background: white;
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
  z-index: 30;
}

.dropdown-content a {
  white-space: nowrap;
  cursor: pointer;
}

/* ─── CONTENEDOR PRINCIPAL ───────────── */
#wrapper {
  transition: transform 0.9s ease;
}

/* ─── SECTION ────────────────────────── */
.section {
  width: 100vw;
  height: 100vh;
  position: relative;
}

#init {
  background: #e3e3ff;
}

/* ─── P5 ─────────────────────────────── */
#p5-container {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* ─── FORM OVERLAY ───────────────────── */
#subscribe-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  z-index: 20;
}

#subscribe-overlay iframe {
  display: block;
  max-width: 100%;
  border: none;
  background: transparent;
}
</style>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

</head>

<body>

<nav>
  <a onclick="goTo(0)">INIT</a>

  <div class="dropdown">
    <a onclick="toggleMenu()">WORK</a>
    <div id="work-menu" class="dropdown-content">
      <a>Artblocks</a>
      <a>Bright Moments</a>
      <a>Interferences</a>
      <a>Explorations</a>
    </div>
  </div>
</nav>

<div id="wrapper">

  <div class="section" id="init">
    <div id="p5-container"></div>

    <div id="subscribe-overlay">
      <iframe width="540" height="305"
        src="https://2aca6431.sibforms.com/serve/MUIFALDayEnwa07abYbQcQh0sZNqq3MoE1hVtkLpDcRCFIN543RP7-94aG8Y3-wszQb6mXglL48Z6LiFFuXbkgYldHYnD33qyhfj8PpXXI0fV7Z7ylj3Y0_sAuAgof4dXXiUHXg9Dv0GQX6UU5q3ZEZ1v-u1fg1w2SzifRVp6WTq1iD8pLisKADOYLbHSmB0x4kLApDXnnMR0LPSwQ=="
        frameborder="0"
        scrolling="auto"
        allowfullscreen>
      </iframe>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="Random.js"></script>
<script src="sketch.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let current = 0;
  const w = document.getElementById("wrapper");

  function apply() {
    w.style.transform = `translateY(${-current * window.innerHeight}px)`;
  }

  window.goTo = function(i) {
    current = 0;
    apply();
  }

  window.toggleMenu = function() {
    const menu = document.getElementById("work-menu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
  }

  document.addEventListener("click", (e) => {
    const menu = document.getElementById("work-menu");
    const dropdown = document.querySelector(".dropdown");

    if (!dropdown.contains(e.target)) {
      menu.style.display = "none";
    }
  });

});
</script>

</body>
</html>
