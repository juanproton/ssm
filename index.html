<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="Random.js"></script>
<script src="sketch.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let current = 0;
  let locked = false;

  const w = document.getElementById("wrapper");

  function apply() {
    w.style.transform = `translateY(${-current * window.innerHeight}px)`;
  }

  window.goTo = function(i) {
    current = Math.max(0, Math.min(3, i));
    apply();
  }

  // scroll desktop
  window.addEventListener("wheel", e => {
    e.preventDefault();
    if (locked) return;

    locked = true;

    if (e.deltaY > 0) current += 1;
    else current -= 1;

    current = Math.max(0, Math.min(3, current));

    apply();

    setTimeout(() => locked = false, 1100);
  }, { passive: false });

  // mobile
  let startY = 0;

  window.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
  });

  window.addEventListener("touchend", e => {
    if (locked) return;

    let endY = e.changedTouches[0].clientY;
    let delta = endY - startY;

    if (Math.abs(delta) < 10) return;

    locked = true;

    if (delta < 0) current += 1;
    else current -= 1;

    current = Math.max(0, Math.min(3, current));

    apply();

    setTimeout(() => locked = false, 900);
  });

  window.addEventListener("resize", apply);
});

// submit feedback (sin recargar)
function handleSubmit() {
  const msg = document.getElementById("msg");
  const mail = document.getElementById("mail").value;

  setTimeout(() => {
    msg.innerText = "you're in → " + mail;
    document.getElementById("mail").value = "";
  }, 300);
}
</script>
