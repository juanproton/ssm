/* ─── TOP BAR ────────────────────────── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
  background: white;
  z-index: 10;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.nav-right {
  display: flex;

}

nav a,
.brand {
  color: black;
  text-decoration: none;
  cursor: pointer;
  white-space: nowrap;
}

/* ─── DROPDOWN ───────────────────────── */
.dropdown {
  position: relative;
}

.dropdown-content {
  position: absolute;
  top: 40px;
  left: 0;
  background: white;
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 10px;
  min-width: 180px;
  z-index: 30;
}

.dropdown-content a {
  color: black;
  text-decoration: none;
  padding: 6px 8px;
  transition: background 0.15s ease, color 0.15s ease;
}

.dropdown-content a:hover {
  background: black;
  color: white;
}

/* ─── SECTION ────────────────────────── */
.section {
  width: 100vw;
  height: 100vh;
  position: relative;
}

#init {
  background: #e3e3ff;
}

/* ─── P5 ─────────────────────────────── */
#p5-container {

  inset: 0;
}

/* ─── BREVO ──────────────────────────── */
.sib-form,
#sib-form-container,
#sib-container {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 0 !important;
  margin: 0 !important;
}

#sib-form {
  display: flex;
  align-items: center;
  gap: 10px;
}

#sib-form > div {

}

#sib-container input {
  width: 180px;
  background: transparent;
  border: none;
  border-bottom: 1px solid black;
  color: black;
  padding: 4px 0;
  font-family: Helvetica, sans-serif;
}

#sib-container input::placeholder {

}

#sib-form button,
.sib-form-block__button {
  background: black !important;
  color: white !important;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  white-space: nowrap;
}

<script>
document.addEventListener("DOMContentLoaded", () => {

  window.goTo = function(i) {
  }

  window.toggleMenu = function() {
    const menu = document.getElementById("work-menu")

    menu.style.display =
      menu.style.display === "flex"
        ? "none"
        : "flex"
  }

  document.addEventListener("click", (e) => {
    const menu = document.getElementById("work-menu")
    const dropdown = document.querySelector(".dropdown")

    if (!dropdown.contains(e.target)) {
      menu.style.display = "none"
    }
  })

})
</script>
