<!DOCTYPE html>

<title>Juan Pedro Vallejo</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, sans-serif;
  overflow: hidden;
}

/* ─── MENU ───────────────────────────── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 20px;
  padding: 20px;
  background: white;
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: black;
  cursor: pointer;
}

/* ─── DROPDOWN ───────────────────────── */
.dropdown {
  position: relative;
}

.dropdown-content {
  position: absolute;
  top: 40px;
  left: 0;
  background: white;
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
  z-index: 30;
}

/* ─── SECTION ────────────────────────── */
.section {
  width: 100vw;
  height: 100vh;
  position: relative;
}

#init {
  background: #e3e3ff;
}

/* ─── P5 ─────────────────────────────── */
#p5-container {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

/* ─── FORM OVERLAY ───────────────────── */
#subscribe-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 20;
}

/* ─── BREVO STYLE OVERRIDE ───────────── */
.sib-form {
  background: transparent !important;
}

#sib-container {
  background-color: transparent !important;
  border: none !important;
  box-shadow: none !important;
}

.sib-form {
  background: transparent !important;
}

/* input style */
#sib-container input {
  background: transparent;
  border: none;
  border-bottom: 1px solid black;
  color: black;
}

#sib-container input::placeholder {
  color: rgba(0,0,0,0.5);
}

/* button */
.sib-form-block__button {
  background: black !important;
  color: white !important;
}
</style>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">
</head>

<body>

<nav>
    <span class="brand">JUAN PEDRO VALLEJO</span>

    <div id="work-menu" class="dropdown-content">
      <a>Artblocks</a>
      <a>Bright Moments</a>
      <a>Interferences</a>
      <a>Explorations</a>

  </div>
</nav>

<div class="section" id="init">

        <div id="sib-container">

            action="https://2aca6431.sibforms.com/serve/MUIFALDayEnwa07abYbQcQh0sZNqq3MoE1hVtkLpDcRCFIN543RP7-94aG8Y3-wszQb6mXglL48Z6LiFFuXbkgYldHYnD33qyhfj8PpXXI0fV7Z7ylj3Y0_sAuAgof4dXXiUHXg9Dv0GQX6UU5q3ZEZ1v-u1fg1w2SzifRVp6WTq1iD8pLisKADOYLbHSmB0x4kLApDXnnMR0LPSwQ==">

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="Random.js"></script>
<script src="sketch.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  window.goTo = function(i) {}

  window.toggleMenu = function() {
    const menu = document.getElementById("work-menu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
  }

  document.addEventListener("click", (e) => {
    const menu = document.getElementById("work-menu");
    const dropdown = document.querySelector(".dropdown");

    if (!dropdown.contains(e.target)) {
      menu.style.display = "none";
    }
  });

});
</script>

<script defer src="https://sibforms.com/forms/end-form/build/main.js"></script>
