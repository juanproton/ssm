<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Juan Pedro Vallejo</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, sans-serif;
  overflow: hidden;
}

/* ─── MENU ───────────────────────────── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 20px;
  padding: 20px;
  background: white;
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: black;
  cursor: pointer;
}

/* ─── CONTENEDOR PRINCIPAL ───────────── */
#wrapper {
  transition: transform 0.9s ease;
  will-change: transform;
}

/* ─── SECCIONES ──────────────────────── */
.section {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  text-align: center;
  flex-direction: column;
}

#init      { background: #e3e3ff; position: relative; }
#work      { background: #e3ffe3; }
#who       { background: #ffe3e3; }
#subscribe { background: #f5e3ff; }

/* ─── P5 ─────────────────────────────── */
#p5-container {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

#subscribe-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
}

#subscribe-overlay iframe {
  display: block;
  max-width: 100%;
  border: none;
  background: transparent;
}
</style>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

</head>

<body>

<nav>
  <a onclick="goTo(0)">INIT</a>
  <a onclick="goTo(1)">WORK</a>
  <a onclick="goTo(2)">SUBSCRIBE</a>
</nav>

<div id="wrapper">

  <!-- INIT -->
  <div class="section" id="init">
    <div id="p5-container"></div>

    <div id="subscribe-overlay">
      <iframe width="540" height="305"
        src="https://2aca6431.sibforms.com/serve/MUIFALDayEnwa07abYbQcQh0sZNqq3MoE1hVtkLpDcRCFIN543RP7-94aG8Y3-wszQb6mXglL48Z6LiFFuXbkgYldHYnD33qyhfj8PpXXI0fV7Z7ylj3Y0_sAuAgof4dXXiUHXg9Dv0GQX6UU5q3ZEZ1v-u1fg1w2SzifRVp6WTq1iD8pLisKADOYLbHSmB0x4kLApDXnnMR0LPSwQ=="
        frameborder="0"
        scrolling="auto"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- WORK -->
  <div class="section" id="work">
    WORK
  </div>

  <!-- SUBSCRIBE (optional duplicate, you can delete if not needed) -->
  <div class="section" id="subscribe">
    SUBSCRIBE
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="Random.js"></script>
<script src="sketch.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let current = 0;
  let locked = false;

  const w = document.getElementById("wrapper");

  function apply() {
    w.style.transform = `translateY(${-current * window.innerHeight}px)`;
  }

  window.goTo = function(i) {
    current = Math.max(0, Math.min(2, i));
    apply();
  }

  window.addEventListener("wheel", e => {
    e.preventDefault();
    if (locked) return;

    locked = true;

    if (e.deltaY > 0) current += 1;
    else current -= 1;

    current = Math.max(0, Math.min(2, current));

    apply();

    setTimeout(() => locked = false, 1100);
  }, { passive: false });

});
</script>

</body>
