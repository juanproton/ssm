<script>
function toggleMenu() {
  const menu = document.getElementById("work-menu")

  menu.style.display =
    menu.style.display === "flex"
      ? "none"
      : "flex"
}

document.addEventListener("click", (e) => {
  const menu = document.getElementById("work-menu")
  const dropdown = document.querySelector(".dropdown")

  if (!dropdown.contains(e.target)) {
    menu.style.display = "none"
  }
})
</script>
